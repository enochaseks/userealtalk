<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RealTalk Reset</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f0f;
        color: #f5f5f5;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        border: 1px solid #2a2a2a;
        border-radius: 14px;
        padding: 18px;
        background: #151515;
      }
      h1 { margin: 0 0 10px; font-size: 20px; }
      p { margin: 0 0 10px; opacity: 0.9; line-height: 1.45; }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        padding: 10px 14px;
        font-weight: 600;
      }
      .muted { opacity: 0.75; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset RealTalk cache (Safari fix)</h1>
      <p>This clears stale browser storage that can cause the app to freeze on iPhone Safari after updates.</p>
      <button id="resetBtn">Reset now</button>
      <p class="muted" id="status"></p>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const setStatus = (text) => {
        statusEl.textContent = text;
      };

      async function clearAll() {
        setStatus("Unregistering service workers...");
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((r) => r.unregister()));
        }

        setStatus("Clearing caches...");
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((k) => caches.delete(k)));
        }

        setStatus("Clearing local/session storage...");
        try { localStorage.clear(); } catch {}
        try { sessionStorage.clear(); } catch {}

        setStatus("Clearing cookies...");
        try {
          document.cookie.split(";").forEach((c) => {
            const eqPos = c.indexOf("=");
            const name = eqPos > -1 ? c.substr(0, eqPos).trim() : c.trim();
            document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`;
          });
        } catch {}

        setStatus("Done. Redirecting...");
        setTimeout(() => {
          window.location.replace(`/?reset=done&_r=${Date.now()}`);
        }, 400);
      }

      document.getElementById("resetBtn").addEventListener("click", () => {
        clearAll().catch(() => {
          setStatus("Reset failed. Please close Safari fully and try again.");
        });
      });
    </script>
  </body>
</html>
